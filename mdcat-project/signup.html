<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Medverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Crimson+Pro:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-bg-orb-1 {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
    top: -150px; right: -150px; pointer-events: none; z-index: 0;
  }
  .auth-bg-orb-2 {
    position: fixed; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    bottom: -100px; left: -100px; pointer-events: none; z-index: 0;
  }
  .auth-grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .back-home {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.8rem; color: var(--text-muted); text-decoration: none;
    margin-bottom: 1.5rem; transition: color 0.2s;
  }
  .back-home:hover { color: var(--accent-2); }
  .password-strength {
    height: 4px; border-radius: 2px; margin-top: 0.5rem;
    background: var(--glass-border); overflow: hidden;
  }
  .strength-bar {
    height: 100%; border-radius: 2px; width: 0%;
    transition: all 0.4s ease;
  }
  .strength-label {
    font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem;
  }
  .signup-perks {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .perk-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 50px;
    background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.15);
    font-size: 0.7rem; color: var(--accent-2);
  }
  .perk-tag i { font-size: 0.65rem; }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="auth-bg-orb-1"></div>
<div class="auth-bg-orb-2"></div>
<div class="auth-grid-bg"></div>

<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <a href="index.html" class="auth-logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">
        Medverse<span>your dream · our mission</span>
      </div>
    </a>

    <div class="auth-title">Create Your Account</div>
    <div class="auth-subtitle">Join 10,000+ students preparing for MDCAT success.</div>

    <div class="signup-perks">
      <span class="perk-tag"><i class="fas fa-bolt"></i> Free Test</span>
      <span class="perk-tag"><i class="fas fa-book"></i> 500+ MCQs</span>
      <span class="perk-tag"><i class="fas fa-chart-line"></i> Analytics</span>
      <span class="perk-tag"><i class="fas fa-users"></i> Community</span>
    </div>

    <form id="signup-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input type="text" id="fullName" class="form-input" placeholder="Ahmed Raza" autocomplete="name">
        <div class="field-error" id="fullName-error"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
          <div class="field-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone (Optional)</label>
          <input type="tel" id="phone" class="form-input" placeholder="03xxxxxxxxx" autocomplete="tel">
          <div class="field-error" id="phone-error"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" class="form-input" placeholder="Minimum 6 characters" autocomplete="new-password">
          <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button>
        </div>
        <div class="password-strength">
          <div class="strength-bar" id="strength-bar"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>
        <div class="field-error" id="password-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password" autocomplete="new-password">
          <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button>
        </div>
        <div class="field-error" id="confirmPassword-error"></div>
      </div>

      <div class="form-check">
        <input type="checkbox" id="agree">
        <label for="agree">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-auth">
        <i class="fas fa-user-plus" style="margin-right:8px"></i> Create Free Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Login here →</a>
    </div>

  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
  // Password strength indicator
  const pwInput = document.getElementById('password');
  const bar = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  if (pwInput) {
    pwInput.addEventListener('input', () => {
      const pw = pwInput.value;
      let strength = 0;
      if (pw.length >= 6) strength++;
      if (pw.length >= 10) strength++;
      if (/[A-Z]/.test(pw)) strength++;
      if (/[0-9]/.test(pw)) strength++;
      if (/[^A-Za-z0-9]/.test(pw)) strength++;
      const pct = (strength / 5) * 100;
      bar.style.width = pct + '%';
      if (strength <= 1) { bar.style.background = '#f43f5e'; label.textContent = 'Weak'; label.style.color = '#f43f5e'; }
      else if (strength <= 3) { bar.style.background = '#f59e0b'; label.textContent = 'Medium'; label.style.color = '#f59e0b'; }
      else { bar.style.background = '#10b981'; label.textContent = 'Strong'; label.style.color = '#10b981'; }
      if (!pw) { bar.style.width = '0'; label.textContent = ''; }
    });
  }
</script>
</body>
</html>
